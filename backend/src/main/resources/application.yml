spring:
  application:
    name: api-monitor

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apimonitor}
    username: ${SPRING_DATASOURCE_USERNAME:apimonitor}
    password: ${SPRING_DATASOURCE_PASSWORD:apimonitor_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-in-production-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  base-url: ${APP_BASE_URL:http://localhost:3000}

logging:
  level:
    com.apimonitor: INFO
    org.springframework.security: WARN
