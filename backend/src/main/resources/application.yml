spring:
  application:
    name: api-monitor

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521:XE}
    username: ${SPRING_DATASOURCE_USERNAME:apimonitor}
    password: ${SPRING_DATASOURCE_PASSWORD:apimonitor}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.OracleDialect
        type:
          preferred_uuid_jdbc_type: CHAR
        jdbc:
          batch_size: 200
        order_inserts: true
        order_updates: true


  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:akabdurlahman@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:nklm bqdr twok pocw}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/api-monitor}

server:
  port: 8088
  error:
    include-message: always

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}

logging:
  level:
    com.apimonitor: INFO
    org.springframework.security: WARN
