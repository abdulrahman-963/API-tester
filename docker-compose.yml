version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: apimonitor-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apimonitor}
      POSTGRES_USER: ${POSTGRES_USER:-apimonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apimonitor_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apimonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apimonitor-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apimonitor}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-apimonitor}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-apimonitor_secret}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-very-long-secret-key-in-production-at-least-256-bits}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apimonitor-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
